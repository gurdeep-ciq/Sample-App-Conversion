<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pipeline Studio — Dagster-backed file ingest</title>
<!-- SheetJS only used for the offline fallback preview when the backend is down. -->
<script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
<style>
  :root{
    --ink:#0f172a;--ink-soft:#334155;--muted:#64748b;--line:#e2e8f0;--line-strong:#cbd5e1;
    --bg:#fff;--bg-alt:#f8fafc;--bg-tinted:#f1f5f9;--accent:#1e40af;--accent-mid:#3b82f6;
    --accent-soft:#dbeafe;--accent-ink:#1e3a8a;--ok:#166534;--ok-soft:#dcfce7;--warn:#92400e;
    --warn-soft:#fef3c7;--bad:#991b1b;--bad-soft:#fee2e2;--purple:#6d28d9;--purple-soft:#ede9fe;
  }
  *{box-sizing:border-box}html,body{margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,system-ui,sans-serif;background:var(--bg-alt);color:var(--ink);line-height:1.55;font-size:14px}
  code,.mono{font-family:"SF Mono",Menlo,Consolas,monospace}
  .app{display:grid;grid-template-columns:228px 1fr;grid-template-rows:56px 1fr;height:100vh}
  .topbar{grid-column:1/-1;display:flex;align-items:center;gap:14px;padding:0 18px;border-bottom:1px solid var(--line);background:#fff}
  .logo{font-size:15px;font-weight:700;letter-spacing:-.02em;color:var(--accent);display:inline-flex;align-items:center;gap:8px}
  .logo svg{width:20px;height:20px}
  .crumb{flex:1;font-size:13px;color:var(--muted)}
  .status-pill{display:inline-flex;align-items:center;gap:6px;font-size:12px;padding:4px 10px;border-radius:14px;border:1px solid var(--line);cursor:pointer}
  .status-pill .dot{width:8px;height:8px;border-radius:50%}
  .status-pill.up{background:var(--ok-soft);color:var(--ok);border-color:#86efac}.status-pill.up .dot{background:var(--ok)}
  .status-pill.down{background:var(--bad-soft);color:var(--bad);border-color:#fca5a5}.status-pill.down .dot{background:var(--bad)}
  .sidebar{border-right:1px solid var(--line);background:var(--bg-alt);padding:14px 12px;overflow-y:auto}
  .side-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin:14px 8px 6px;font-weight:600}.side-label:first-child{margin-top:2px}
  .side-nav{list-style:none;padding:0;margin:0}.side-nav li{margin:2px 0}
  .side-nav button{width:100%;text-align:left;display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:6px;font-size:13px;color:var(--ink-soft);background:none;border:none;cursor:pointer;font-family:inherit}
  .side-nav button:hover{background:rgba(0,0,0,.04)}.side-nav button.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
  .side-nav button:disabled{opacity:.4;cursor:not-allowed}
  .side-nav .dot{width:8px;height:8px;border-radius:50%;background:var(--line-strong);flex-shrink:0}.side-nav .dot.done{background:var(--ok)}.side-nav .dot.active{background:var(--accent)}
  .main{padding:24px 30px 64px;overflow-y:auto;background:var(--bg)}
  .page-title{font-size:22px;font-weight:700;margin:0 0 4px;letter-spacing:-.01em}
  .page-sub{font-size:13px;color:var(--muted);margin:0 0 20px}
  .wizard{display:flex;align-items:center;flex-wrap:wrap;background:var(--bg-alt);border:1px solid var(--line);border-radius:8px;padding:12px 16px;margin-bottom:22px;font-size:12px;gap:2px}
  .w-step{display:inline-flex;align-items:center;gap:6px;color:var(--muted);padding:0 8px;cursor:pointer}
  .w-step .num{display:inline-flex;width:22px;height:22px;background:#fff;border:1px solid var(--line-strong);border-radius:50%;align-items:center;justify-content:center;font-weight:700;font-size:11px}
  .w-step.done{color:var(--ok)}.w-step.done .num{background:var(--ok);color:#fff;border-color:var(--ok)}
  .w-step.active{color:var(--accent);font-weight:600}.w-step.active .num{background:var(--accent);color:#fff;border-color:var(--accent)}
  .w-sep{color:var(--line-strong);margin:0 2px}
  .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 15px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid transparent;text-decoration:none;line-height:1.1;font-family:inherit}
  .btn.primary{background:var(--accent);color:#fff}.btn.primary:hover{background:var(--accent-ink)}
  .btn.secondary{background:#fff;color:var(--ink);border-color:var(--line-strong)}.btn.secondary:hover{background:var(--bg-alt)}
  .btn.ghost{background:transparent;color:var(--ink-soft)}.btn.success{background:var(--ok);color:#fff}
  .btn:disabled{opacity:.5;cursor:not-allowed}.btn.lg{padding:11px 20px;font-size:14px}
  .row-between{display:flex;justify-content:space-between;align-items:center;margin-top:24px;gap:12px}
  .drop-zone{border:2px dashed var(--line-strong);border-radius:12px;padding:56px 40px;text-align:center;background:var(--bg-alt);cursor:pointer;transition:all .12s}
  .drop-zone:hover,.drop-zone.hover{background:var(--accent-soft);border-color:var(--accent-mid)}
  .drop-zone .icon{width:56px;height:56px;border-radius:50%;background:var(--accent-soft);color:var(--accent);display:inline-flex;align-items:center;justify-content:center;margin:0 auto 14px}
  .drop-zone .icon svg{width:28px;height:28px}.drop-zone h3{margin:0 0 8px;font-size:18px}.drop-zone p{margin:0;color:var(--muted);font-size:13px}
  .formats{margin-top:16px;display:inline-flex;gap:6px;flex-wrap:wrap}.fmt{padding:3px 9px;background:#fff;border:1px solid var(--line);border-radius:4px;font-size:11px;color:var(--ink-soft)}
  .pane{background:var(--bg-alt);border:1px solid var(--line);border-radius:8px;padding:16px;margin-bottom:16px}
  .pane-title{font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--muted);margin:0 0 12px;font-weight:600}
  .stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
  .stat-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px 16px}
  .stat-card .label{font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;margin-bottom:4px}
  .stat-card .value{font-size:22px;font-weight:700;line-height:1.1}
  table.data{width:100%;border-collapse:collapse;font-size:12px}
  table.data th{text-align:left;background:var(--bg-tinted);padding:8px 12px;border-bottom:1px solid var(--line);font-size:10px;text-transform:uppercase;letter-spacing:.04em;font-weight:600;color:var(--muted);white-space:nowrap}
  table.data td{padding:7px 12px;border-bottom:1px solid var(--line);vertical-align:top}
  table.data tbody tr:hover{background:var(--bg-alt)}
  .scroll-x{overflow-x:auto;border:1px solid var(--line);border-radius:8px;background:#fff}
  .badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;line-height:1.4}
  .badge.ok{background:var(--ok-soft);color:var(--ok)}.badge.warn{background:var(--warn-soft);color:var(--warn)}
  .badge.bad{background:var(--bad-soft);color:var(--bad)}.badge.info{background:var(--accent-soft);color:var(--accent-ink)}
  .badge.purple{background:var(--purple-soft);color:var(--purple)}.badge.muted{background:var(--bg-tinted);color:var(--muted)}
  .alert{display:flex;gap:10px;align-items:flex-start;padding:12px 14px;border-radius:8px;margin-bottom:16px;font-size:13px}
  .alert.info{background:var(--accent-soft);border:1px solid #93c5fd;color:var(--accent-ink)}
  .alert.warn{background:var(--warn-soft);border:1px solid #fcd34d;color:var(--warn)}
  .alert.ok{background:var(--ok-soft);border:1px solid #86efac;color:var(--ok)}
  .alert.bad{background:var(--bad-soft);border:1px solid #fca5a5;color:var(--bad)}
  .sheet-card{background:#fff;border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin:8px 0;display:flex;gap:12px;align-items:flex-start}
  .sheet-card.meta{opacity:.7}
  .sheet-card .body{flex:1}.sheet-card .h{font-size:14px;font-weight:600;margin-bottom:4px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .sheet-card .sub{font-size:12px;color:var(--muted)}
  .group-card{background:#fff;border:1px solid var(--line);border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin:8px 0}
  .group-card.union{border-left-color:var(--purple)}
  .chip{display:inline-block;padding:3px 9px;background:var(--bg-tinted);border:1px solid var(--line);border-radius:12px;font-size:11px;margin:2px 3px 2px 0}
  .map-row{display:grid;grid-template-columns:1.1fr 26px 1.2fr 110px 70px;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid var(--line)}
  .map-row.head{font-size:10px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;border-bottom:1px solid var(--line-strong)}
  .map-src{font-family:"SF Mono",Menlo,monospace;font-size:12px;background:var(--bg-tinted);border:1px solid var(--line);border-radius:5px;padding:5px 8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .map-arrow{text-align:center;color:var(--accent-mid)}
  .map-row select{width:100%;font-size:12px;border:1px solid var(--line-strong);border-radius:5px;padding:5px 6px;background:#fff;font-family:inherit}
  .rule{background:#fff;border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin:7px 0;display:flex;gap:12px;align-items:flex-start}.rule.off{opacity:.55}
  .toggle{width:38px;height:22px;background:var(--accent);border-radius:12px;position:relative;flex-shrink:0;margin-top:2px;cursor:pointer;border:none}
  .toggle::after{content:"";position:absolute;width:16px;height:16px;background:#fff;border-radius:50%;top:3px;right:3px;box-shadow:0 1px 3px rgba(0,0,0,.2)}
  .toggle.off{background:var(--line-strong)}.toggle.off::after{right:auto;left:3px}
  .rule .rt{font-size:13px;font-weight:600;margin-bottom:3px}.rule .why{font-size:12px;color:var(--muted)}
  .rule .spec{background:var(--bg-tinted);border:1px solid var(--line);border-radius:5px;padding:6px 9px;font-size:11px;color:var(--ink-soft);font-family:"SF Mono",Menlo,monospace;margin-top:4px;word-break:break-all}
  .asset-card{display:flex;align-items:center;gap:10px;background:#fff;border:1px solid var(--line);border-radius:7px;padding:8px 12px;margin:6px 0;font-size:12px}
  .asset-card .k{font-family:"SF Mono",Menlo,monospace;font-weight:600}
  .code-block{background:#0f172a;color:#e2e8f0;padding:13px 15px;border-radius:8px;font-family:"SF Mono",Menlo,monospace;font-size:11px;line-height:1.6;overflow-x:auto;white-space:pre}
  .empty-hint{text-align:center;color:var(--muted);padding:50px 20px;font-size:14px}
  input.text-in{padding:7px 10px;border:1px solid var(--line-strong);border-radius:6px;font-size:13px;font-family:inherit}
  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="M7 14l4-4 3 3 5-6"/></svg>
      Pipeline Studio
    </div>
    <div class="crumb" id="crumb">New ingestion</div>
    <div class="status-pill down" id="status" title="Click to set backend URL">
      <span class="dot"></span><span id="status-text">backend: checking…</span>
    </div>
    <button class="btn secondary" id="reset-btn">Reset</button>
  </div>
  <div class="sidebar">
    <div class="side-label">Wizard</div>
    <ul class="side-nav" id="nav"></ul>
    <div class="side-label">Engine</div>
    <div style="font-size:12px;color:var(--muted);padding:4px 10px;line-height:1.5" id="engine-info">—</div>
  </div>
  <div class="main" id="main"></div>
</div>

<script>
/* ============================================================
   Pipeline Studio frontend — backend-first (compact-dagster),
   with an offline preview fallback when the backend is down.
   ============================================================ */
const STEPS = ["Upload","Sheets","Entities","Rules","Run","Export"];      // manual wizard
const AUTO_STEPS = ["Upload","Business rules","Result"];                   // LLM autopilot
const LS_URL = "ps_backend_url";
const DEFAULT_URL = "http://127.0.0.1:8000";

const state = {
  step:0, auto:false,                 // auto = full LLM automation (set from /health)
  backend:{url: localStorage.getItem(LS_URL)||DEFAULT_URL, healthy:false, dagster:null, llm:false, model:null, db:null},
  fileName:null, fileId:null, sheets:[], unionGroups:[], registry:[],
  overrides:{}, rulesBySheet:{}, groupsEnabled:{}, ingest:null, offline:null,
  rules:"", automate:null,            // autopilot: business-rules text + /automate result
  files:[], automateResults:[], cleanRows:false,
};
const activeSteps = () => state.auto ? AUTO_STEPS : STEPS;

const $=s=>document.querySelector(s);
const el=(t,a={},kids=[])=>{const n=document.createElement(t);for(const k in a){if(k==="class")n.className=a[k];else if(k==="html")n.innerHTML=a[k];else if(k.startsWith("on"))n.addEventListener(k.slice(2),a[k]);else if(a[k]===false||a[k]==null){/* skip falsy boolean attrs (e.g. disabled:false) so the attr is absent */}else n.setAttribute(k,a[k]);}(Array.isArray(kids)?kids:[kids]).forEach(c=>{if(c==null)return;n.appendChild(typeof c==="string"?document.createTextNode(c):c);});return n;};
const esc=s=>String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
function dl(name,text,mime="text/plain"){const b=new Blob([text],{type:mime});const u=URL.createObjectURL(b);const a=el("a",{href:u,download:name});document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(u);}
function dlUrl(url){const a=el("a",{href:url});document.body.appendChild(a);a.click();a.remove();}  // backend sends Content-Disposition

const api = {
  async health(){ const r=await fetch(state.backend.url+"/health",{cache:"no-store"}); return r.json(); },
  async profile(file){ const fd=new FormData(); fd.append("file",file); const r=await fetch(state.backend.url+"/profile",{method:"POST",body:fd}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.statusText); return r.json(); },
  async ingest(plan){ const r=await fetch(state.backend.url+"/ingest",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify(plan)}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.statusText); return r.json(); },
  async confirm(confs){ const r=await fetch(state.backend.url+"/registry/confirm",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({confirmations:confs})}); return r.json(); },
  async runs(){ const r=await fetch(state.backend.url+"/runs",{cache:"no-store"}); return r.json(); },
  async automate(fileId, business_rules, clean_rows){ const r=await fetch(state.backend.url+"/automate",{method:"POST",headers:{"content-type":"application/json"},body:JSON.stringify({fileId,business_rules,clean_rows:!!clean_rows})}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.statusText); return r.json(); },
  async uploads(){ const r=await fetch(state.backend.url+"/uploads",{cache:"no-store"}); return r.json(); },
  async schema(){ const r=await fetch(state.backend.url+"/schema",{cache:"no-store"}); return r.json(); },
  async deleteUpload(fileId){ const r=await fetch(state.backend.url+"/uploads/"+encodeURIComponent(fileId),{method:"DELETE"}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.statusText); return r.json(); },
  async resetWarehouse(){ const r=await fetch(state.backend.url+"/warehouse",{method:"DELETE"}); if(!r.ok) throw new Error((await r.json().catch(()=>({}))).detail||r.statusText); return r.json(); },
};
async function checkHealth(){
  try{ const h=await api.health(); state.backend.healthy=true; state.backend.dagster=h.dagster;
    state.backend.llm=!!h.llm; state.backend.model=h.model; state.backend.db=h.db; state.auto=!!h.llm;
    $("#status").className="status-pill up"; $("#status-text").textContent="backend: up";
    $("#engine-info").innerHTML = h.llm
      ? `AI autopilot<br><code>${esc(h.model)}</code><br>→ ${esc(h.db)}`
      : `compact-dagster<br><code>${esc(h.dagster)}</code><br>in-process materialize()`;
  }catch{ state.backend.healthy=false; state.auto=false;
    $("#status").className="status-pill down"; $("#status-text").textContent="backend: down";
    $("#engine-info").innerHTML="offline fallback<br>(start <code>run-backend.ps1</code> for Dagster)";
  }
}

function maxReached(){
  if(state.auto){ return state.automateResults.length?2:(state.files.length?1:0); }
  if(state.ingest)return 5; if(Object.keys(state.rulesBySheet).length)return 4; if(state.sheets.length)return 3; return state.fileId?1:0;
}
function renderNav(){
  const ul=$("#nav"); ul.innerHTML="";
  activeSteps().forEach((s,i)=>{
    const reach=i<=Math.max(maxReached(),state.step);
    ul.appendChild(el("li",{},[el("button",{class:i===state.step?"active":"",disabled:!reach,onclick:()=>{if(reach){state.step=i;render();}}},
      [el("span",{class:"dot "+(i<state.step?"done":i===state.step?"active":"")}),`${i+1}. ${s}`])]));
  });
}
function wizardBar(){
  const steps=activeSteps(); const bar=el("div",{class:"wizard"});
  steps.forEach((s,i)=>{const c=i<state.step?"done":i===state.step?"active":"";
    bar.appendChild(el("span",{class:"w-step "+c,onclick:()=>{if(i<=maxReached()){state.step=i;render();}}},[el("span",{class:"num"},i<state.step?"✓":String(i+1)),s]));
    if(i<steps.length-1)bar.appendChild(el("span",{class:"w-sep"},"—"));});
  return bar;
}
function render(){
  renderNav();
  $("#crumb").textContent = state.fileName ? `${state.fileName} · ${activeSteps()[state.step]}` : "New ingestion";
  const m=$("#main"); m.innerHTML=""; m.appendChild(wizardBar());
  const map = state.auto ? {0:rUpload,1:rAutoRules,2:rAutoResult}
                         : {0:rUpload,1:rSheets,2:rEntities,3:rRules,4:rRun,5:rExport};
  (map[state.step]||rUpload)(m);
}
function reRender(){ render(); }

/* Step 0: Upload */
function rUpload(m){
  const multi = state.backend.healthy && state.auto;
  m.appendChild(el("h1",{class:"page-title"}, multi?"Upload files":"Upload a file"));
  m.appendChild(el("p",{class:"page-sub"}, multi
    ? "Drop one or more messy spreadsheets/CSVs. The AI proposes a canonical schema, generates the Dagster pipeline, and loads each file — later files integrate into the schema the earlier ones built."
    : "Drop a messy spreadsheet/CSV. The backend profiles every sheet, suggests a canonical schema, and compiles a Dagster ingestion pipeline."));
  if(!state.backend.healthy)
    m.appendChild(el("div",{class:"alert warn"},[icon("warn"),el("div",{html:`<b>Backend not reachable</b> at <code>${esc(state.backend.url)}</code>. Start it with <code>run-backend.ps1</code> for full multi-sheet + entity-matching + Dagster execution. You can still do a basic offline preview below.`})]));
  const dz=el("div",{class:"drop-zone"},[
    el("div",{class:"icon",html:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>'}),
    el("h3",{}, !state.backend.healthy?"Drop a file (offline preview)":multi?"Drop files or click to browse":"Drop a file or click to browse"),
    el("p",{},"Multi-sheet workbooks, metadata sheets, split date/time, scientific-notation codes, internal-sale rows — all handled."),
    el("div",{class:"formats"},[".xlsx",".xls",".csv",".tsv"].map(f=>el("span",{class:"fmt"},f)))
  ]);
  const input=el("input",{type:"file",accept:".xlsx,.xls,.csv,.tsv,.txt",class:"hidden",
    ...(multi?{multiple:"multiple"}:{}),
    onchange:e=>{ const fs=[...e.target.files]; if(fs.length) multi?handleFiles(fs):handleFile(fs[0]); }});
  dz.addEventListener("click",()=>input.click());
  dz.addEventListener("dragover",e=>{e.preventDefault();dz.classList.add("hover");});
  dz.addEventListener("dragleave",()=>dz.classList.remove("hover"));
  dz.addEventListener("drop",e=>{e.preventDefault();dz.classList.remove("hover"); const fs=[...e.dataTransfer.files]; if(fs.length) multi?handleFiles(fs):handleFile(fs[0]);});
  m.appendChild(dz); m.appendChild(input);
  if(multi){ const lib=el("div",{style:"margin-top:18px"}); m.appendChild(lib); loadLibrary(lib); }
}
function addExisting(fileId, fileName){
  if(!state.files.some(f=>f.fileId===fileId)) state.files.push({fileId, fileName, existing:true});
  state.automate=null; state.step=1; render();   // straight to Business rules — no re-upload
}
async function loadLibrary(host){
  // --- previously uploaded files (reuse by fileId, no re-upload) ---
  const up=el("div",{class:"pane"}); up.appendChild(el("div",{class:"pane-title"},"Previously uploaded files — reuse without re-uploading"));
  const ub=el("div",{},el("div",{class:"empty-hint",style:"padding:12px"},"Loading…")); up.appendChild(ub); host.appendChild(up);
  try{ const r=await api.uploads(); ub.innerHTML="";
    if(!(r.uploads||[]).length) ub.appendChild(el("div",{class:"empty-hint",style:"padding:12px"},"No previous uploads yet."));
    (r.uploads||[]).forEach(u=>{ const inBatch=state.files.some(f=>f.fileId===u.fileId);
      ub.appendChild(el("div",{class:"sheet-card"},[
        el("div",{class:"body"},[el("div",{class:"h"},[u.fileName||u.fileId]),
          el("div",{class:"sub"},`${(u.size/1024).toFixed(1)} KB · ${esc(String(u.uploadedAt||"").replace("T"," ").slice(0,16))} · id ${esc(u.fileId)}`)]),
        el("div",{style:"display:flex;gap:6px;align-items:center"},[
          el("button",{class:"btn secondary",disabled:inBatch,onclick:()=>addExisting(u.fileId,u.fileName||u.fileId)}, inBatch?"✓ Added":"+ Add to batch"),

  });
  m.appendChild(el("div",{class:"row-between"},[
    el("button",{class:"btn ghost",onclick:()=>{state.step=1;render();}},"← Back"),
    el("div",{style:"display:flex;gap:10px"},[
      el("button",{class:"btn secondary",onclick:saveMappings},"Save mappings to registry"),
      el("button",{class:"btn primary lg",onclick:()=>{state.step=3;render();}},"Configure rules →")
    ])
  ]));
}
async function saveMappings(){
  const confs=Object.entries(state.overrides).map(([source,entity])=>({source,entity}));
  if(!confs.length){ alert("No confirmed mappings to save."); return; }
  try{ const r=await api.confirm(confs); state.registry=r.entities; alert(`Saved ${confs.length} mappings. The registry now has ${r.entities.length} canonical entities (learned aliases persisted).`); }
  catch(e){ alert("Save failed: "+e.message); }
}

/* Step 3: Rules */
function rRules(m){
  m.appendChild(el("h1",{class:"page-title"},"Pipeline rules"));
  m.appendChild(el("p",{class:"page-sub"},"Cleanup/filter/cast rules the backend proposed per sheet. Toggle off any you disagree with — they run inside the Dagster assets."));
  const activeSheets=new Set();
  state.unionGroups.filter(g=>state.groupsEnabled[g.table]).forEach(g=>g.members.forEach(mb=>activeSheets.add(mb)));
  state.sheets.filter(s=>s.kind==="data"&&activeSheets.has(s.name)).forEach(s=>{
    const pane=el("div",{class:"pane"});
    pane.appendChild(el("div",{class:"pane-title"},`${s.name}`));
    const rules=state.rulesBySheet[s.name]||[];
    rules.forEach(r=>{
      const card=el("div",{class:"rule"+(r.enabled?"":" off")});
      card.appendChild(el("button",{class:"toggle"+(r.enabled?"":" off"),onclick:()=>{r.enabled=!r.enabled;reRender();}}));
      const conf=r.confidence>=0.8?["ok","High"]:r.confidence>=0.6?["warn","Medium"]:["bad","Low"];
      card.appendChild(el("div",{style:"flex:1"},[
        el("div",{class:"rt"},r.title),
        el("div",{style:"margin:3px 0"},[el("span",{class:"badge "+conf[0]},conf[1]),el("span",{class:"badge muted",style:"margin-left:4px"},r.kind.replace("_"," "))]),
        r.why?el("div",{class:"why"},r.why):null,
        el("div",{class:"spec"},JSON.stringify(r.spec))
      ]));
      pane.appendChild(card);
    });
    if(!rules.length) pane.appendChild(el("div",{class:"empty-hint"},"No rules proposed for this sheet."));
    m.appendChild(pane);
  });
  m.appendChild(el("div",{class:"row-between"},[
    el("button",{class:"btn ghost",onclick:()=>{state.step=2;render();}},"← Back"),
    el("button",{class:"btn primary lg",onclick:runIngest},"Run Dagster pipeline →")
  ]));
}

/* Step 4: Run */
async function runIngest(){
  const m=$("#main"); m.innerHTML=""; m.appendChild(wizardBar());
  m.appendChild(el("div",{class:"alert info"},[icon("info"),el("div",{},"Executing Dagster materialize() on the backend…")]));
  const tables=state.unionGroups.filter(g=>state.groupsEnabled[g.table]).map(g=>({
    table:g.table, members:g.members, overrides:state.overrides,
    ruleOverrides:Object.fromEntries(g.members.map(mb=>[mb,(state.rulesBySheet[mb]||[])]))
  }));
  if(!tables.length){ alert("No tables enabled."); state.step=1; render(); return; }
  try{ state.ingest=await api.ingest({fileId:state.fileId,tables}); try{ state.runs=(await api.runs()).runs; }catch{} state.step=4; render(); }
  catch(e){ alert("Ingest failed: "+e.message); state.step=3; render(); }
}
function rRun(m){
  const res=state.ingest;
  m.appendChild(el("h1",{class:"page-title"},"Dagster run results"));
  m.appendChild(el("p",{class:"page-sub"},"Each table compiled to a partitioned Dagster job and materialized on a shared, persistent instance. Cleaned tables are written to the warehouse; runs accumulate in the run history below."));
  if(!res){ m.appendChild(el("div",{class:"empty-hint"},"No run yet.")); return; }
  res.tables.forEach(t=>{
    const dr=t.dagsterRun||{};
    const pane=el("div",{class:"pane"});
    pane.appendChild(el("div",{style:"display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap"},[
      el("span",{class:"pane-title",style:"margin:0"},`Table: ${t.table}`),
      el("span",{class:"badge "+(dr.success?"ok":"bad")}, dr.success?"materialize ✓":"failed"),
      el("span",{class:"badge info"},`${t.rowCount} rows`),
      el("span",{class:"badge muted"},`${t.schema.columns.length} cols`),
      dr.runId?el("span",{class:"badge muted",title:"Dagster run id"},`run ${String(dr.runId).slice(0,8)}`):null,
      dr.partition?el("span",{class:"badge purple",title:"Dagster partition (this upload)"},`partition: ${dr.partition}`):null
    ]));
    dr.assets&&dr.assets.forEach(a=>{
      const md=a.metadata||{}; const bits=[];
      if(md.row_count!=null)bits.push(`rows: ${md.row_count}`);
      if(md.rows_kept!=null)bits.push(`kept ${md.rows_kept}/${md.rows_in}`);
      if(md["dagster/column_schema"])bits.push(`schema: ${md["dagster/column_schema"].columns.length} cols`);
      if(md.warehouse_path)bits.push(`→ ${md.warehouse_path}`);
      pane.appendChild(el("div",{class:"asset-card"},[el("span",{class:"badge ok"},"●"),el("span",{class:"k"},a.asset),el("span",{style:"color:var(--muted)"},bits.join(" · "))]));
    });
    // asset checks
    if(dr.checks&&dr.checks.length){
      const cw=el("div",{style:"margin:8px 0"});
      dr.checks.forEach(c=>cw.appendChild(el("span",{class:"badge "+(c.passed?"ok":"bad"),style:"margin-right:5px"},`check: ${c.name} ${c.passed?"✓":"✕"}`)));
      pane.appendChild(cw);
    }
    // schema vs registry
    const sc=t.schemaChange||{};
    const scWrap=el("div",{style:"margin:10px 0"});
    scWrap.appendChild(el("div",{class:"pane-title"},`Schema vs registry — ${sc.verdict||""}`));
    (sc.known||[]).forEach(k=>scWrap.appendChild(el("span",{class:"chip",style:"border-color:#86efac;background:var(--ok-soft);color:var(--ok)"},k)));
    (sc.new||[]).forEach(k=>scWrap.appendChild(el("span",{class:"chip",style:"border-color:#c4b5fd;background:var(--purple-soft);color:var(--purple)"},k+" (new)")));
    pane.appendChild(scWrap);
    // cross-run drift vs previous upload
    const cr=t.crossRun||{};
    const crCls=(cr.drift||"").startsWith("breaking")?"bad":cr.drift==="new columns added"?"warn":"muted";
    const crWrap=el("div",{style:"margin:6px 0"},[el("span",{class:"badge "+crCls},`cross-run: ${cr.drift||"—"}`)]);
    (cr.added||[]).forEach(k=>crWrap.appendChild(el("span",{class:"chip",style:"border-color:#fcd34d;background:var(--warn-soft);color:var(--warn)"},"+"+k)));
    (cr.removed||[]).forEach(k=>crWrap.appendChild(el("span",{class:"chip",style:"border-color:#fca5a5;background:var(--bad-soft);color:var(--bad)"},"−"+k)));
    pane.appendChild(crWrap);
    if(dr.warehousePath) pane.appendChild(el("div",{style:"font-size:11px;color:var(--muted);font-family:monospace;margin:4px 0 2px"},`persisted → ${dr.warehousePath}`));
    pane.appendChild(el("div",{class:"pane-title"},"Cleaned output (first 6 rows)"));
    pane.appendChild(tablePreview(t.rows.slice(0,6), t.schema.columns.map(c=>c.name)));
    t.members.forEach(mb=>{
      if(mb.rowsDropped>0||t.members.length>1){
        pane.appendChild(el("div",{style:"font-size:12px;color:var(--muted);margin-top:10px"},`${mb.sheet}: ${mb.rowsKept}/${mb.rowsIn} kept, ${mb.rowsDropped} dropped`));
        if(mb.dropped&&mb.dropped.length){
          [...new Set(mb.dropped.map(d=>d.reason))].forEach(rz=>pane.appendChild(el("span",{class:"chip",style:"border-color:#fca5a5;background:var(--bad-soft);color:var(--bad)"},rz)));
        }
      }
    });
    m.appendChild(pane);
  });
  // persisted Dagster run history (shared instance)
  const runs=state.runs||[];
  if(runs.length){
    const hp=el("div",{class:"pane"});
    hp.appendChild(el("div",{class:"pane-title"},`Dagster run history · ${runs.length} run(s) on the shared instance (this session)`));
    const tt=el("table",{class:"data"});
    tt.appendChild(el("thead",{html:"<tr><th>Run</th><th>Status</th><th>Partition (upload)</th><th>Job</th></tr>"}));
    const tb=el("tbody");
    runs.forEach(r=>tb.appendChild(el("tr",{html:`<td><code>${esc(String(r.runId).slice(0,8))}</code></td><td><span class="badge ${r.status==='SUCCESS'?'ok':'muted'}">${esc(r.status)}</span></td><td>${esc(r.partition||'—')}</td><td><code>${esc(r.job||'')}</code></td>`})));
    tt.appendChild(tb); hp.appendChild(el("div",{class:"scroll-x"},tt)); m.appendChild(hp);
  }
  m.appendChild(el("div",{class:"row-between"},[
    el("button",{class:"btn ghost",onclick:()=>{state.step=3;render();}},"← Back to rules"),
    el("button",{class:"btn success lg",onclick:()=>{state.step=5;render();}},"Export →")
  ]));
}
function tablePreview(rows,cols){
  const wrap=el("div",{class:"scroll-x"}); const t=el("table",{class:"data"});
  t.appendChild(el("thead",{html:"<tr>"+cols.map(c=>`<th>${esc(c)}</th>`).join("")+"</tr>"}));
  const tb=el("tbody"); rows.forEach(r=>tb.appendChild(el("tr",{html:cols.map(c=>`<td>${esc(r[c]==null?"":String(r[c]).slice(0,40))}</td>`).join("")}))); t.appendChild(tb);
  wrap.appendChild(t); return wrap;
}

/* Step 5: Export */
function rExport(m){
  const res=state.ingest;
  m.appendChild(el("h1",{class:"page-title"},"Export"));
  m.appendChild(el("p",{class:"page-sub"},"Download artifacts per table. Pipeline spec is re-runnable; the schema is what Dagster materialized."));
  res.tables.forEach(t=>{
    const pane=el("div",{class:"pane"});
    pane.appendChild(el("div",{class:"pane-title"},`${t.table} · ${t.rowCount} rows · ${t.schema.columns.length} cols`));
    const cols=t.schema.columns.map(c=>c.name);
    const outs=[
      ["Cleaned data (CSV)",()=>dl(t.table+".csv",toCSV(t.rows,cols),"text/csv")],
      ["Cleaned data (JSON)",()=>dl(t.table+".json",JSON.stringify(t.rows,null,2),"application/json")],
      ["Schema — SQL DDL",()=>dl(t.table+".sql",t.ddl,"text/plain")],
      ["Schema — JSON",()=>dl(t.table+".schema.json",JSON.stringify(t.schema,null,2),"application/json")],
      ["Pipeline spec (JSON)",()=>dl(t.table+".pipeline.json",JSON.stringify({table:t.table,members:t.members.map(x=>x.sheet),schema:t.schema,schemaChange:t.schemaChange},null,2),"application/json")],
      ["Dropped-rows report (CSV)",()=>{const rows=t.members.flatMap(mb=>(mb.dropped||[]).map(d=>`"${mb.sheet}","${String(d.reason).replace(/"/g,'""')}","${String(d.sample==null?"":d.sample).replace(/"/g,'""')}"`));dl(t.table+".dropped.csv",["sheet,reason,sample_value",...rows].join("\n"),"text/csv");}],
    ];
    const g=el("div",{style:"display:grid;grid-template-columns:1fr 1fr;gap:8px"});
    outs.forEach(([lab,fn])=>g.appendChild(el("div",{class:"rule",style:"margin:0"},[el("div",{style:"flex:1"},el("div",{class:"rt"},lab)),el("button",{class:"btn secondary",onclick:fn},"Download")])));
    pane.appendChild(g);
    pane.appendChild(el("div",{class:"pane-title",style:"margin-top:12px"},"DDL"));
    pane.appendChild(el("div",{class:"code-block"},t.ddl));
    m.appendChild(pane);
  });
  m.appendChild(el("div",{class:"row-between"},[
    el("button",{class:"btn ghost",onclick:()=>{state.step=4;render();}},"← Back"),
    el("button",{class:"btn success lg",onclick:()=>{res.tables.forEach(t=>dl(t.table+".csv",toCSV(t.rows,t.schema.columns.map(c=>c.name)),"text/csv"));}},"Download all data")
  ]));
}
function toCSV(rows,cols){
  const head=cols.join(",");
  const body=rows.map(r=>cols.map(c=>{let v=r[c];if(v==null)return"";v=String(v);return /[",\n]/.test(v)?`"${v.replace(/"/g,'""')}"`:v;}).join(","));
  return [head,...body].join("\n");
}

/* Offline fallback (preview only) */
async function offlineParse(file){
  const m=$("#main"); m.innerHTML=""; m.appendChild(wizardBar());
  if(typeof XLSX==="undefined"){ alert("Offline parser unavailable (SheetJS didn't load)."); return; }
  const buf=await file.arrayBuffer();
  const wb=XLSX.read(buf,{type:"array",cellDates:true});
  state.offline={name:file.name,sheets:wb.SheetNames.map(nm=>({name:nm,aoa:XLSX.utils.sheet_to_json(wb.Sheets[nm],{header:1,defval:null,blankrows:false})}))};
  m.appendChild(el("h1",{class:"page-title"},"Offline preview"));
  m.appendChild(el("div",{class:"alert warn"},[icon("warn"),el("div",{html:"Backend is down — this is a read-only preview (no entity matching, union, or Dagster execution). Start <code>run-backend.ps1</code> and re-upload for the full pipeline."})]));
  state.offline.sheets.forEach(s=>{
    const pane=el("div",{class:"pane"});
    pane.appendChild(el("div",{style:"display:flex;justify-content:space-between;align-items:center"},[
      el("div",{class:"pane-title",style:"margin:0"},`${s.name} · ${s.aoa.length} rows`),
      el("button",{class:"btn secondary",onclick:()=>{const csv=s.aoa.map(r=>(r||[]).map(c=>{let v=c==null?"":String(c);return /[",\n]/.test(v)?`"${v.replace(/"/g,'""')}"`:v;}).join(",")).join("\n");dl(s.name+".csv",csv,"text/csv");}},"Download CSV")
    ]));
    const wrap=el("div",{class:"scroll-x"}); const t=el("table",{class:"data"}); const tb=el("tbody");
    s.aoa.slice(0,8).forEach(r=>tb.appendChild(el("tr",{html:(r||[]).slice(0,12).map(c=>`<td>${esc(c==null?"":String(c).slice(0,30))}</td>`).join("")})));
    t.appendChild(tb); wrap.appendChild(t); pane.appendChild(wrap); m.appendChild(pane);
  });
  m.appendChild(el("div",{class:"row-between"},[el("button",{class:"btn ghost",onclick:()=>{state.step=0;render();}},"← Back"),el("button",{class:"btn secondary",onclick:async()=>{await checkHealth();if(state.backend.healthy)handleFile(file);else alert("Still down.");}},"Retry with backend")]));
}

function icon(kind){
  const p={info:'<circle cx="12" cy="12" r="10"/><line x1="12" y1="16" x2="12" y2="12"/><line x1="12" y1="8" x2="12.01" y2="8"/>',
    warn:'<path d="M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>',
    ok:'<path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/>'};
  return el("span",{html:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:18px;height:18px">${p[kind]}</svg>`}).firstChild;
}

$("#reset-btn").addEventListener("click",()=>{Object.assign(state,{step:0,fileName:null,fileId:null,sheets:[],unionGroups:[],overrides:{},rulesBySheet:{},groupsEnabled:{},ingest:null,offline:null,rules:"",automate:null,files:[],automateResults:[],cleanRows:false});render();});
$("#status").addEventListener("click",async()=>{const u=prompt("Backend URL:",state.backend.url);if(u){state.backend.url=u.trim().replace(/\/$/,"");localStorage.setItem(LS_URL,state.backend.url);await checkHealth();render();}});
(async()=>{ await checkHealth(); render(); })();
</script>
</body>
